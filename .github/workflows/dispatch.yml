name: Portfolio Update (repository_dispatch)

# Triggered by an external repository_dispatch event with event_type: "portfolio-update"
# Payload format:
#   {
#     "event_type": "portfolio-update",
#     "client_payload": {
#       "instruction": "Update bio to: I love building tools.",
#       "update_provider": "llm-ops", // optional: copilot | llm-ops
#       "operations": []   // optional: skip AI and pass edit ops directly
#     }
#   }

on:
  repository_dispatch:
    types: [portfolio-update]

  # Allow manual trigger from Actions UI for testing
  workflow_dispatch:
    inputs:
      instruction:
        description: "Free-text instruction for the agent"
        required: true
        default: "Update bio to: Available for new opportunities."
      update_provider:
        description: "Provider override: copilot or llm-ops (optional)"
        required: false
        default: ""
      operations:
        description: "Optional JSON array of edit operations (overrides AI parsing)"
        required: false
        default: ""

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  update:
    name: Run Update Pipeline
    runs-on: ubuntu-latest

    outputs:
      auto_merge: ${{ steps.agent.outputs.auto_merge }}
      provider: ${{ steps.agent.outputs.provider }}
      status: ${{ steps.agent.outputs.status }}
      delegation_url: ${{ steps.agent.outputs.delegation_url }}
      pr_number: ${{ steps.create-pr.outputs.pr_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT (or GITHUB_TOKEN) so that push triggers CI on the new branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build agent payload
        id: payload
        env:
          # repository_dispatch payload
          DISPATCH_INSTRUCTION: ${{ github.event.client_payload.instruction }}
          DISPATCH_OPERATIONS: ${{ toJSON(github.event.client_payload.operations) }}
          DISPATCH_PROVIDER: ${{ github.event.client_payload.update_provider }}
          # workflow_dispatch inputs
          WD_INSTRUCTION: ${{ inputs.instruction }}
          WD_PROVIDER: ${{ inputs.update_provider }}
          WD_OPERATIONS: ${{ inputs.operations }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            {
              echo 'INSTRUCTION<<EOF'
              echo "$DISPATCH_INSTRUCTION"
              echo 'EOF'
            } >> "$GITHUB_ENV"
            # Write operations to a temp file if provided
            if [ "${DISPATCH_OPERATIONS}" != "null" ] && [ -n "${DISPATCH_OPERATIONS}" ]; then
              printf '%s' "${DISPATCH_OPERATIONS}" > /tmp/operations.json
              node -e "JSON.parse(require('fs').readFileSync('/tmp/operations.json', 'utf8'))"
              echo "OPS_FILE=/tmp/operations.json" >> "$GITHUB_ENV"
            fi
            if [ -n "${DISPATCH_PROVIDER}" ]; then
              echo "UPDATE_PROVIDER=${DISPATCH_PROVIDER}" >> "$GITHUB_ENV"
            fi
          else
            {
              echo 'INSTRUCTION<<EOF'
              echo "$WD_INSTRUCTION"
              echo 'EOF'
            } >> "$GITHUB_ENV"
            if [ -n "${WD_OPERATIONS}" ]; then
              printf '%s' "${WD_OPERATIONS}" > /tmp/operations.json
              node -e "JSON.parse(require('fs').readFileSync('/tmp/operations.json', 'utf8'))"
              echo "OPS_FILE=/tmp/operations.json" >> "$GITHUB_ENV"
            fi
            if [ -n "${WD_PROVIDER}" ]; then
              echo "UPDATE_PROVIDER=${WD_PROVIDER}" >> "$GITHUB_ENV"
            fi
          fi

      - name: Run agent pipeline
        id: agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_TEMPERATURE: ${{ secrets.AZURE_OPENAI_TEMPERATURE }}
          UPDATE_PROVIDER: ${{ env.UPDATE_PROVIDER }}
          INSTRUCTION: ${{ env.INSTRUCTION }}
        run: |
          if [ -n "$OPS_FILE" ] && [ -s "$OPS_FILE" ]; then
            node -e "const fs=require('fs'); const {spawnSync}=require('child_process'); const payload={instruction: process.env.INSTRUCTION || '', operations: JSON.parse(fs.readFileSync(process.env.OPS_FILE, 'utf8'))}; const args=['pipeline/agent.js']; if (process.env.UPDATE_PROVIDER) { args.push('--provider', process.env.UPDATE_PROVIDER); } args.push('--json', JSON.stringify(payload)); const result=spawnSync('node', args, {stdio:'inherit'}); process.exit(result.status ?? 1);" || EXIT=$?
          else
            if [ -n "$UPDATE_PROVIDER" ]; then
              node pipeline/agent.js --provider "$UPDATE_PROVIDER" --instruction "$INSTRUCTION" || EXIT=$?
            else
              node pipeline/agent.js --instruction "$INSTRUCTION" || EXIT=$?
            fi
          fi

          EXIT=${EXIT:-0}
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"

          # exit code 2 means auto-merge intent detected
          if [ "$EXIT" -eq 2 ]; then
            echo "auto_merge=true" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT" -eq 0 ]; then
            echo "auto_merge=false" >> "$GITHUB_OUTPUT"
          else
            echo "Pipeline failed with exit code $EXIT" >&2
            exit $EXIT
          fi

      - name: Check for content changes
        id: diff
        if: steps.agent.outputs.provider == 'llm-ops'
        run: |
          git diff --quiet content/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.agent.outputs.provider == 'llm-ops' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="agent/update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add content/
          git commit -m "chore(content): automated update via portfolio agent

          Instruction: ${{ env.INSTRUCTION }}
          Triggered by: ${{ github.event_name }}"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Create pull request
        id: create-pr
        if: steps.agent.outputs.provider == 'llm-ops' && steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTO_MERGE: ${{ steps.agent.outputs.auto_merge }}
        run: |
          TITLE="chore(content): portfolio update — $(date +%Y-%m-%d)"
          BODY="## Portfolio Content Update

          **Instruction:** \`${{ env.INSTRUCTION }}\`
          **Auto-merge requested:** \`${AUTO_MERGE}\`
          **Triggered by:** \`${{ github.event_name }}\`

          ---
          _This PR was created automatically by the portfolio agent pipeline._"

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$BODY")

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "Created PR: $PR_URL"

      - name: Copilot delegation result
        if: steps.agent.outputs.provider == 'copilot'
        run: |
          echo "Copilot provider status: ${{ steps.agent.outputs.status }}"
          if [ "${{ steps.agent.outputs.status }}" = "delegated" ]; then
            echo "Delegated URL: ${{ steps.agent.outputs.delegation_url }}"
          fi

  auto-merge:
    name: Auto-merge (if intent detected)
    needs: update
    if: needs.update.outputs.provider == 'llm-ops' && needs.update.outputs.auto_merge == 'true' && needs.update.outputs.pr_number != ''
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable auto-merge on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ needs.update.outputs.pr_number }}"
          echo "Auto-merge intent detected. Enabling auto-merge for PR #${PR_NUMBER}…"
          gh pr merge "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash \
            --subject "chore(content): auto-merged portfolio update"
